{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card p-5">
            <h1 class="display-4 fw-bold mb-5 text-center text-primary">{{ t.setup_title }}</h1>
            
            <form action="/start_quiz" method="POST">
                <div class="mb-4">
                    <label class="form-label h5">{{ t.select_category }}</label>
                    <div class="row g-3">
                        {% for id, name in categories.items() %}
                        <div class="col-md-4">
                            <div class="form-check card p-3 h-100 border-secondary">
                                <input class="form-check-input" type="radio" name="category" id="cat{{ id }}" value="{{ id }}" required>
                                <label class="form-check-label h6 mb-0 ms-2" for="cat{{ id }}">
                                    {{ name }}
                                </label>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label h5">{{ t.game_length }}</label>
                    <div class="row g-3">
                        {% for id, text in lengths.items() %}
                        <div class="col-md-4">
                            <div class="form-check card p-3 h-100 border-secondary">
                                <input class="form-check-input" type="radio" name="length" id="len{{ id }}" value="{{ id }}" required>
                                <label class="form-check-label h6 mb-0 ms-2" for="len{{ id }}">
                                    {{ text }}
                                </label>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label h5">{{ t.difficulty }}</label>
                    <div class="row g-3">
                        {% for id, text in difficulties.items() %}
                        <div class="col-md-4">
                            <div class="form-check card p-3 h-100 border-secondary">
                                <input class="form-check-input" type="radio" name="difficulty" id="diff{{ id }}" value="{{ id }}" required>
                                <label class="form-check-label h6 mb-0 ms-2" for="diff{{ id }}">
                                    {{ text }}
                                </label>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label h5">{{ t.language }}</label>
                    <select class="form-select form-select-lg border-secondary" name="language" required>
                        {% for code, name in languages.items() %}
                        <option value="{{ code }}" {% if code == 'en' %}selected{% endif %}>{{ name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5">{{ t.start_game }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
